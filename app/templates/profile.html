{% extends "base.html" %}
{% block content %} 
    <div class="mx-auto items-center flex justify-center h-screen bg-[#2b2d42]">
        <div class="text-center flex flex-col gap-1 text-[#ffffff] bg-[#0d1b2a] p-10 rounded-2xl">
            <h2>User Profile</h2>
            <p>Name: {{ user.name }}</p>
            <p>Email: {{ user.email }}</p>
            <div class="flex justify-center p-4">
                <img src="{{ user.picture }}" class="rounded-full p-2" width="100">
            </div>
            <a href="/" class="bg-[#778da9] rounded-full">
                <button class=" pt-3 pb-3 cursor-pointer">Home</button>
            </a>
        </div>
    </div>
{% endblock %}
